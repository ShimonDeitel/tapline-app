name: Tapline - Beer Log
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Tapline-BeerLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tapline-BeerLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beerlog
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tapline-BeerLog/Info.plist
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Tapline-BeerLog/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
  Tapline-BeerLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tapline-BeerLogTests
    dependencies:
      - target: Tapline-BeerLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
  Tapline-BeerLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tapline-BeerLogUITests
    dependencies:
      - target: Tapline-BeerLog
    settings:
      base:
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Tapline-BeerLog:
    build:
      targets:
        Tapline-BeerLog: all
    test:
      targets:
        - Tapline-BeerLogTests
        - Tapline-BeerLogUITests
    run:
      config: Debug
